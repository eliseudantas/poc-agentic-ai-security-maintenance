name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: test-projects/nodejs-react-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: test-projects/nodejs-react-app

      - name: Run tests
        run: npm test
        working-directory: test-projects/nodejs-react-app

      - name: Run tests with coverage
        run: npm run test:cov
        working-directory: test-projects/nodejs-react-app

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: test-projects/nodejs-react-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: test-projects/nodejs-react-app

      - name: Build project
        run: npm run build
        working-directory: test-projects/nodejs-react-app

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: test-projects/nodejs-react-app/dist/
          retention-days: 7
